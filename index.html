<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>English Practice Room</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-dots" aria-hidden="true"></div>

    <header class="site-header">
      <h1 class="site-title">
        English
        <span class="h-in">Practice </span>
        <span class="h-on">Room</span>
      </h1>
      <p class="site-subtitle">Welcome to the English practice room!</p>
      <button class="btn btn-leaderboard-home" id="btn-show-leaderboard" type="button">
        🏆 Ver Leaderboard
      </button>
    </header>

    <!-- Global leaderboard panel -->
    <section class="home-leaderboard" id="home-leaderboard" hidden aria-live="polite">
      <h2 class="leaderboard-title">🏆 Mejores puntajes globales</h2>
      <ol class="leaderboard-list" id="home-leaderboard-list"></ol>
    </section>

    <section class="topics-grid">
      <div class="topic-card">
        <a
          href="PreposicionesIN_ON_AT/index.html"
          class="chip"
          id="btn-prepositions"
        >
          Prepositions
        </a>
        <p class="topic-desc">Practice prepositions IN, ON and AT.</p>
      </div>
    </section>

    <script src="supabase-config.js"></script>
    <script>
      const colors = ["chip-in", "chip-on", "chip-at"];
      document
        .getElementById("btn-prepositions")
        .classList.add(colors[Math.floor(Math.random() * colors.length)]);

      /* ── Global leaderboard ── */
      const EXERCISE_LABELS = {
        "preposiciones-reglas":   "Preposiciones · Reglas",
        "preposiciones-ejemplos": "Preposiciones · Ejemplos",
      };

      function escapeHTML(str) {
        const d = document.createElement("div");
        d.textContent = str;
        return d.innerHTML;
      }

      function exerciseLabel(id) {
        return EXERCISE_LABELS[id] || id || "—";
      }

      function formatDate(isoStr) {
        if (!isoStr) return "—";
        return new Date(isoStr).toLocaleDateString("es-ES", {
          day: "numeric", month: "short", year: "numeric",
        });
      }

      const btnLeaderboard   = document.getElementById("btn-show-leaderboard");
      const leaderboardPanel = document.getElementById("home-leaderboard");
      const leaderboardList  = document.getElementById("home-leaderboard-list");

      btnLeaderboard.addEventListener("click", async () => {
        if (!leaderboardPanel.hidden) {
          leaderboardPanel.hidden = true;
          btnLeaderboard.textContent = "🏆 Ver Leaderboard";
          return;
        }

        btnLeaderboard.textContent = "Cargando…";
        btnLeaderboard.disabled = true;

        try {
          const params = new URLSearchParams({
            select: "player,score,correct,total,played_at,exercise",
            order: "score.desc,played_at.asc",
            limit: "10",
          });
          const res = await fetch(
            `${window.SUPABASE_URL}/rest/v1/scores?${params}`,
            {
              headers: {
                "apikey":        window.SUPABASE_ANON_KEY,
                "Authorization": `Bearer ${window.SUPABASE_ANON_KEY}`,
              },
            }
          );
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const scores = await res.json();

          if (!scores.length) {
            leaderboardList.innerHTML = "<li class='lb-empty'>Aún no hay puntajes guardados.</li>";
          } else {
            leaderboardList.innerHTML = scores
              .map(
                (s) =>
                  `<li>
                    <div class="lb-main">
                      <span class="lb-name">${escapeHTML(s.player)}</span>
                      <span class="lb-score">${s.score} pts</span>
                    </div>
                    <div class="lb-meta">
                      <span class="lb-exercise">${escapeHTML(exerciseLabel(s.exercise))}</span>
                      <span class="lb-date">${formatDate(s.played_at)}</span>
                    </div>
                  </li>`
              )
              .join("");
          }

          leaderboardPanel.hidden = false;
          btnLeaderboard.textContent = "✕ Cerrar Leaderboard";
        } catch (err) {
          console.error(err);
          btnLeaderboard.textContent = "⚠️ Error al cargar";
        } finally {
          btnLeaderboard.disabled = false;
        }
      });
    </script>
  </body>
</html>
